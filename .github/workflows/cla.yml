# Contributor License Agreement check. Requires a repo secret PERSONAL_ACCESS_TOKEN
# (a PAT with repo scope) so the bot can store signatures in a gist/branch.
# Until that secret is set, this workflow is inert on PRs (it will no-op/skip).
name: CLA

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, synchronize]

jobs:
  cla:
    runs-on: ubuntu-latest
    if: ${{ github.event.repository.private == false }}
    steps:
      - name: CLA Assistant
        if: ${{ secrets.PERSONAL_ACCESS_TOKEN != '' }}
        uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PERSONAL_ACCESS_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
        with:
          path-to-signatures: "signatures/cla.json"
          path-to-document: "https://github.com/memloom/memloom/blob/main/CLA.md"
          branch: "cla-signatures"
          allowlist: "dependabot[bot]"
