openapi: 3.1.0
info:
  title: memloom local API
  version: 0.1.0
  description: |
    The HTTP API served by the `memloom serve` daemon on your machine. The CLI, the MCP server,
    and the viewer all route through this API — the daemon is the single owner of the store, so
    every client shares one consistent view of your memories.

    No authentication: the daemon binds to `127.0.0.1` only and is reachable solely from your
    own machine. Browser clients on other localhost ports are allowed via CORS.
servers:
  - url: http://127.0.0.1:4319
    description: Local memloom daemon
paths:
  /health:
    get:
      summary: Health check
      description: Returns ok when the daemon is up. Used by clients to detect a running daemon.
      operationId: health
      responses:
        "200":
          description: Daemon is running.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
  /memory/save:
    post:
      summary: Save a memory
      description: |
        Save a memory through the belief pipeline: exact-duplicate detection, semantic dedup, and
        contradiction detection. Instead of overwriting, a contradiction keeps **both** memories
        active and returns `outcome: conflict` with a `conflictId` for you to resolve.

        In offline mode (no `OPENROUTER_API_KEY`) dedup is off and every save is `added`.
      operationId: saveMemory
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SaveInput"
      responses:
        "200":
          description: The save decision.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SaveResult"
        "400":
          $ref: "#/components/responses/ValidationError"
        "503":
          $ref: "#/components/responses/StoreLocked"
  /memory/query:
    post:
      summary: Recall memories
      description: |
        Hybrid retrieval over active memories: vector similarity + exact keyword + entity match,
        fused with reciprocal-rank fusion. Trust the result **order** (`rrfScore` is rank-based
        and small by design, ~0.03 max); `similarity` is the cosine meaning-signal alone.
      operationId: queryMemory
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [query]
              properties:
                query:
                  type: string
                  description: What to recall, in natural language or exact identifiers.
                  example: what are my plans for today
                limit:
                  type: integer
                  description: Maximum results (default 10).
                  example: 5
      responses:
        "400":
          $ref: "#/components/responses/ValidationError"
        "503":
          $ref: "#/components/responses/StoreLocked"
        "200":
          description: Ranked memories.
          content:
            application/json:
              schema:
                type: object
                properties:
                  memories:
                    type: array
                    items:
                      $ref: "#/components/schemas/Memory"
  /memory/list:
    get:
      summary: List all active memories
      description: |
        Every active memory, newest first — the browsing counterpart to query-driven recall.
        Stale (superseded) memories are excluded.
      operationId: listMemories
      responses:
        "200":
          description: The active memories.
          content:
            application/json:
              schema:
                type: object
                properties:
                  memories:
                    type: array
                    items:
                      $ref: "#/components/schemas/Memory"
  /memory/index:
    post:
      summary: Index memories and context chunks (extract entities)
      description: |
        Extract entities from memories AND context chunks that have not been indexed yet and
        link them into the graph with mention edges. Runs the LLM extractor (one call per row,
        so large documents take proportionally longer); a no-op in offline mode.
      operationId: indexMemories
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: How many memories and context chunks were indexed in this run.
          content:
            application/json:
              schema:
                type: object
                properties:
                  indexed:
                    type: integer
                    description: Memories processed this run.
                    example: 3
                  chunksIndexed:
                    type: integer
                    description: Context chunks processed this run.
                    example: 12
  /memory/index/stream:
    post:
      summary: Index with real-time progress (NDJSON stream)
      description: |
        Same work as /memory/index, but the response streams newline-delimited JSON as it
        runs: one `{"type":"item"}` event per processed memory/chunk (with its label, 1-based
        position, total, and extracted entity names), then a final `{"type":"done"}` event
        with the run totals. Failures mid-run arrive in-band as `{"type":"error"}`.
      operationId: indexMemoriesStream
      requestBody:
        required: false
        content:
          application\json:
            schema:
              type: object
      responses:
        "200":
          description: NDJSON progress stream ending with a done (or error) event.
          content:
            application/x-ndjson:
              schema:
                type: string
                example: |
                  {"type":"item","kind":"chunk","id":"...","label":"notes.pdf › 2. DEFINICJA 2.","index":3,"total":46,"entities":["granica","funkcja"]}
                  {"type":"done","indexed":0,"chunksIndexed":46}
  /memory/graph:
    get:
      summary: Get the memory graph
      description: |
        One graph, two granularities: active memories, extracted entities, and context
        documents as nodes, with the edges between them. Chunk-level mention edges are rolled
        up to one weighted document -> entity edge, so documents stay single nodes.
      operationId: getGraph
      responses:
        "200":
          description: The graph.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Graph"
  /memory/conflicts:
    get:
      summary: List pending conflicts
      description: Contradictions the belief pipeline flagged that you have not resolved yet. Both sides stay active until you decide.
      operationId: listConflicts
      responses:
        "200":
          description: Pending conflicts.
          content:
            application/json:
              schema:
                type: object
                properties:
                  conflicts:
                    type: array
                    items:
                      $ref: "#/components/schemas/Conflict"
  /memory/conflicts/{id}/resolve:
    post:
      summary: Resolve a conflict
      description: |
        Apply one of the four human-in-the-loop resolutions. Every resolution is non-destructive
        (losers go `stale`, never deleted) and reversible via the revert endpoint.
      operationId: resolveConflict
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: The conflict id from the save response or the conflicts list.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResolveDecision"
      responses:
        "400":
          $ref: "#/components/responses/ValidationError"
        "200":
          description: Resolution applied.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
  /memory/conflicts/{id}/revert:
    post:
      summary: Revert a resolution
      description: Undo a previous resolution — staled memories come back to active and the conflict returns to the pending list.
      operationId: revertConflict
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Resolution reverted.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
  /context/add:
    post:
      summary: Ingest a file as context
      description: |
        Extract, chunk, embed, and store a .md/.txt/.pdf file from the daemon's machine.
        Documents are **mirrors** of files: re-adding an unchanged file is a no-op
        (`unchanged`), a changed file replaces its chunks (`updated`). Markdown chunks carry
        their heading breadcrumb; PDF chunks keep their page number. Chunks surface in normal
        `/memory/query` results with a `source`.
      operationId: contextAdd
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [path]
              properties:
                path:
                  type: string
                  description: Absolute path to a .md, .txt, or .pdf file on this machine.
                  example: C:\Users\me\notes\setup.md
      responses:
        "400":
          $ref: "#/components/responses/ValidationError"
        "503":
          $ref: "#/components/responses/StoreLocked"
        "200":
          description: What happened to the document.
          content:
            application/json:
              schema:
                type: object
                properties:
                  documentId:
                    type: string
                  outcome:
                    type: string
                    enum: [added, updated, unchanged]
                  title:
                    type: string
                    example: Deploy Guide
                  chunks:
                    type: integer
                    example: 12
  /context/documents:
    get:
      summary: List context documents
      operationId: listContextDocuments
      responses:
        "200":
          description: Ingested documents, most recently updated first.
          content:
            application/json:
              schema:
                type: object
                properties:
                  documents:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        path:
                          type: string
                        title:
                          type: string
                        kind:
                          type: string
                          enum: [md, txt, pdf]
                        chunkCount:
                          type: integer
                        updatedAt:
                          type: string
                          format: date-time
  /context/documents/{id}/chunks:
    get:
      summary: Get a document's chunks and their entity edges
      description: |
        One document at chunk granularity: chunks in order, plus their chunk -> entity mention
        edges. The graph endpoint rolls these up to one weighted document -> entity edge; this
        is the drill-down the viewer fetches when a document node is expanded.
      operationId: getDocumentChunks
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: The chunks and edges.
          content:
            application/json:
              schema:
                type: object
                properties:
                  chunks:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        chunkIndex:
                          type: integer
                        content:
                          type: string
                        headingPath:
                          type: string
                          nullable: true
                          example: Runbook > Restarts
                        page:
                          type: integer
                          nullable: true
                          description: 1-based PDF page, when the chunk came from a PDF.
                  edges:
                    type: array
                    items:
                      type: object
                      properties:
                        from:
                          type: string
                          description: Chunk id.
                        to:
                          type: string
                          description: Entity id.
                        relation:
                          type: string
                          example: mention
  /context/documents/{id}/open:
    post:
      summary: Open the source file on the daemon's machine
      description: |
        Opens the document's file with the OS default application (what the viewer's
        "Open file" button calls). Only ingested documents can be opened — the id lookup is
        the gate, so no arbitrary path ever reaches the opener.
      operationId: openContextDocument
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: The opener was launched.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
        "404":
          description: No document with that id.
  /context/documents/{id}:
    delete:
      summary: Remove a context document
      description: Deletes the document and all of its chunks (cascade). The source file on disk is untouched.
      operationId: removeContextDocument
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Removed.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
  /admin/shutdown:
    post:
      summary: Stop the daemon
      description: |
        Gracefully stop the daemon (what `memloom stop` calls): acknowledges, then closes the
        Postgres wire server, the HTTP server, the store, and releases the data-dir lock.
      operationId: shutdown
      responses:
        "200":
          description: Shutdown acknowledged; the daemon exits right after responding.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
                  stopping:
                    type: boolean
                    example: true
components:
  responses:
    StoreLocked:
      description: |
        The store is held by a connected Postgres wire client (Drizzle Studio, psql). PGLite is
        single-connection — disconnect that client and retry. All `/memory/*` endpoints can
        return this.
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
                example: the store is locked by a connected Postgres wire client (Drizzle Studio, psql, a DB panel). PGLite is single-connection — disconnect that client and retry.
    ValidationError:
      description: The request body failed validation. `issues` names each offending field.
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
                example: invalid request body
              issues:
                type: array
                items:
                  type: object
                  properties:
                    path:
                      type: string
                      example: query
                    message:
                      type: string
                      example: query must be a non-empty string
  schemas:
    SaveInput:
      type: object
      required: [content]
      properties:
        content:
          type: string
          description: The memory text to save.
          example: Acme reached $100 MRR.
        canonical:
          type: string
          description: Optional short canonical form used for exact-duplicate detection.
          example: Acme $100 MRR milestone
        memoryType:
          type: string
          enum: [fact, preference, episode, procedure]
          default: fact
          description: >-
            The kind of memory (defaults to `fact`):
            `fact` — a stable truth about the world or the user;
            `preference` — how the user likes things done;
            `episode` — a time-bound event or decision;
            `procedure` — reusable how-to steps.
          example: fact
        ownerId:
          type: string
          description: Owner UUID. Defaults to the fixed single-user sentinel in the embedded tier.
    SaveResult:
      type: object
      required: [id, outcome]
      properties:
        id:
          type: string
          description: Id of the saved (or merged-into) memory.
        outcome:
          type: string
          enum: [added, merged, conflict]
          description: What the belief pipeline did.
        conflictId:
          type: string
          description: Present when `outcome` is `conflict` — resolve it via the conflicts endpoints.
    Memory:
      type: object
      properties:
        id:
          type: string
        ownerId:
          type: string
        status:
          type: string
          enum: [active, stale]
        memoryType:
          type: string
          description: >-
            The kind of memory: one of `fact`, `preference`, `episode`, `procedure`. Recall
            results for ingested context chunks carry the sentinel `context` (see `kind`).
          example: fact
        canonical:
          type: string
          nullable: true
        content:
          type: string
        summary:
          type: string
          nullable: true
        assertedAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
        similarity:
          type: number
          description: Cosine similarity to the query (meaning signal alone). Present on recall results.
          example: 0.85
        rrfScore:
          type: number
          description: Fused reciprocal-rank-fusion score. Rank-based and small by design — use it for ordering, not as a percentage.
          example: 0.0328
        kind:
          type: string
          enum: [memory, context]
          description: Whether this result is a saved memory or a chunk of an ingested context document.
        source:
          type: object
          description: Present on context-chunk results — where the text came from.
          properties:
            documentId:
              type: string
            title:
              type: string
              example: Deploy Guide
            path:
              type: string
            headingPath:
              type: string
              nullable: true
              example: Deploy Guide > Database
            page:
              type: integer
              nullable: true
              description: 1-based PDF page.
    Conflict:
      type: object
      properties:
        id:
          type: string
        createdAt:
          type: string
          format: date-time
        incoming:
          type: object
          properties:
            id:
              type: string
            canonical:
              type: string
              nullable: true
            content:
              type: string
        candidates:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              canonical:
                type: string
                nullable: true
              content:
                type: string
              relation:
                type: string
                example: contradictory
              reason:
                type: string
                description: The classifier's explanation of why these contradict.
    ResolveDecision:
      oneOf:
        - type: object
          title: keep_new
          required: [action]
          properties:
            action:
              type: string
              enum: [keep_new]
              description: The new memory wins; existing candidates go stale.
        - type: object
          title: keep_existing
          required: [action, candidateId]
          properties:
            action:
              type: string
              enum: [keep_existing]
            candidateId:
              type: string
              description: The existing memory that wins; the new one goes stale.
        - type: object
          title: keep_both
          required: [action]
          properties:
            action:
              type: string
              enum: [keep_both]
              description: Mark them distinct; both stay active.
        - type: object
          title: merge
          required: [action, content]
          properties:
            action:
              type: string
              enum: [merge]
            content:
              type: string
              description: The reconciled memory text that supersedes both.
            canonical:
              type: string
    Graph:
      type: object
      properties:
        memories:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              canonical:
                type: string
                nullable: true
              content:
                type: string
              memoryType:
                type: string
                enum: [fact, preference, episode, procedure]
                example: fact
        entities:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              name:
                type: string
                example: Postgres
              entityType:
                type: string
                example: technology
        documents:
          type: array
          description: Ingested context documents. The display granularity for context — chunk mentions roll up here.
          items:
            type: object
            properties:
              id:
                type: string
              title:
                type: string
                example: runbook.md
              path:
                type: string
                example: /home/me/docs/runbook.md
        edges:
          type: array
          items:
            type: object
            properties:
              from:
                type: string
              to:
                type: string
              relation:
                type: string
                example: mention
              weight:
                type: integer
                description: On document -> entity edges — how many of the document's chunks mention the entity.
                example: 3
