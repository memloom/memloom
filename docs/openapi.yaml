openapi: 3.1.0
info:
  title: memloom local API
  version: 0.1.0
  description: |
    The HTTP API served by the `memloom serve` daemon on your machine. The CLI, the MCP server,
    and the viewer all route through this API. The daemon is the single owner of the store, so
    every client shares one consistent view of your memories.

    No authentication: the daemon binds to `127.0.0.1` only and is reachable solely from your
    own machine. Browser clients on other localhost ports are allowed via CORS.
servers:
  - url: http://127.0.0.1:4319
    description: Local memloom daemon
paths:
  /health:
    get:
      summary: Health check
      description: Returns ok when the daemon is up. Used by clients to detect a running daemon.
      operationId: health
      responses:
        "200":
          description: Daemon is running.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
  /memory/save:
    post:
      summary: Save a memory
      description: |
        Save a memory through the belief pipeline: exact-duplicate detection, semantic dedup, and
        contradiction detection. A contradiction keeps **both** memories active and returns
        `outcome: conflict` with a `conflictId` for you to resolve. Nothing is overwritten.

        In offline mode (no `OPENROUTER_API_KEY`) dedup is off and every save is `added`.
      operationId: saveMemory
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SaveInput"
      responses:
        "200":
          description: The save decision.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SaveResult"
        "400":
          $ref: "#/components/responses/ValidationError"
        "503":
          $ref: "#/components/responses/StoreLocked"
  /memory/query:
    post:
      summary: Recall memories
      description: |
        Hybrid retrieval over active memories: vector similarity + exact keyword + entity match,
        fused with reciprocal-rank fusion. Results are ordered by `rrfScore`, which is rank-based
        and small by design (about 0.03 max). `similarity` is the plain cosine similarity score.
      operationId: queryMemory
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [query]
              properties:
                query:
                  type: string
                  description: What to recall, in natural language or exact identifiers.
                  example: what are my plans for today
                limit:
                  type: integer
                  description: Maximum results (default 10).
                  example: 5
      responses:
        "400":
          $ref: "#/components/responses/ValidationError"
        "503":
          $ref: "#/components/responses/StoreLocked"
        "200":
          description: Ranked memories.
          content:
            application/json:
              schema:
                type: object
                properties:
                  memories:
                    type: array
                    items:
                      $ref: "#/components/schemas/Memory"
  /memory/list:
    get:
      summary: List all active memories
      description: |
        Every active memory, newest first. Use this to browse the store; use /memory/query
        for relevance-ranked recall. Stale (superseded) memories are excluded.
      operationId: listMemories
      responses:
        "200":
          description: The active memories.
          content:
            application/json:
              schema:
                type: object
                properties:
                  memories:
                    type: array
                    items:
                      $ref: "#/components/schemas/Memory"
  /memory/index:
    post:
      summary: Index memories and context chunks (extract entities)
      description: |
        Extract entities from memories AND context chunks that have not been indexed yet and
        link them into the graph with mention edges. Runs the LLM extractor (one call per row,
        so large documents take proportionally longer); a no-op in offline mode.
      operationId: indexMemories
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: How many memories and context chunks were indexed in this run.
          content:
            application/json:
              schema:
                type: object
                properties:
                  indexed:
                    type: integer
                    description: Memories processed this run.
                    example: 3
                  chunksIndexed:
                    type: integer
                    description: Context chunks processed this run.
                    example: 12
  /memory/index/stream:
    post:
      summary: Index with real-time progress (NDJSON stream)
      description: |
        Same work as /memory/index, but the response streams newline-delimited JSON as it
        runs: one `{"type":"item"}` event per processed memory/chunk (with its label, 1-based
        position, total, and extracted entity names), then a final `{"type":"done"}` event
        with the run totals. Failures mid-run arrive in-band as `{"type":"error"}`.
      operationId: indexMemoriesStream
      requestBody:
        required: false
        content:
          application\json:
            schema:
              type: object
      responses:
        "200":
          description: NDJSON progress stream ending with a done (or error) event.
          content:
            application/x-ndjson:
              schema:
                type: string
                example: |
                  {"type":"item","kind":"chunk","id":"...","label":"notes.pdf › 2. DEFINICJA 2.","index":3,"total":46,"entities":["granica","funkcja"]}
                  {"type":"done","indexed":0,"chunksIndexed":46}
  /memory/reindex:
    post:
      summary: Rebuild the graph from scratch
      description: |
        Wipes every extracted artifact (all entities, their mention edges, and all typed
        entity-to-entity edges), then re-runs indexing over everything. Belief edges
        (replaces, distinct) are never touched. Use it to recover when an older extraction
        pipeline polluted the graph.
      operationId: reindexMemories
      requestBody:
        required: false
        content:
          application\json:
            schema:
              type: object
      responses:
        "200":
          description: How many memories and context chunks were re-indexed.
          content:
            application\json:
              schema:
                type: object
                properties:
                  indexed:
                    type: integer
                  chunksIndexed:
                    type: integer
  /memory/reindex/stream:
    post:
      summary: Rebuild with real-time progress (NDJSON stream)
      description: |
        Same work as /memory/reindex, streamed as newline-delimited JSON in the same shape
        as /memory/index/stream (item events, then done; errors in-band).
      operationId: reindexMemoriesStream
      requestBody:
        required: false
        content:
          application\json:
            schema:
              type: object
      responses:
        "200":
          description: NDJSON progress stream ending with a done (or error) event.
          content:
            application/x-ndjson:
              schema:
                type: string
  /memory/index/runs:
    get:
      summary: Index sessions (persistent run history)
      description: |
        Every index/reindex pass is recorded as a run: trigger (index|rebuild), status
        (running|success|warning|error|interrupted), batch size, per-kind indexed counts,
        failures, and entity/relation totals. Newest first. The viewer's Console polls this
        while a run is live; history survives restarts and includes CLI runs.
      operationId: listIndexRuns
      responses:
        "200":
          description: Runs, newest first.
          content:
            application\json:
              schema:
                type: object
                properties:
                  runs:
                    type: array
                    items:
                      type: object
                      properties:
                        id: { type: string, format: uuid }
                        trigger: { type: string, enum: [index, rebuild] }
                        status:
                          type: string
                          enum: [running, success, warning, error, interrupted]
                        batchSize: { type: integer, example: 14 }
                        memoriesIndexed: { type: integer }
                        chunksIndexed: { type: integer }
                        itemsFailed: { type: integer }
                        entitiesLinked: { type: integer }
                        relationsCreated: { type: integer }
                        startedAt: { type: string, format: date-time }
                        finishedAt: { type: string, format: date-time, nullable: true }
    delete:
      summary: Clear the whole indexing history
      operationId: clearIndexRuns
      responses:
        "200":
          description: All runs and their events deleted.
  /memory/index/runs/{id}/events:
    get:
      summary: The per-item log lines of one run
      operationId: getIndexRunEvents
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Events, oldest first.
          content:
            application\json:
              schema:
                type: object
                properties:
                  events:
                    type: array
                    items:
                      type: object
                      properties:
                        id: { type: string, format: uuid }
                        level: { type: string, enum: [info, success, warning, error] }
                        message:
                          type: string
                          example: "[3/12] chunk notes.pdf › Intro → Postgres (+1 relationship)"
                        itemId: { type: string, format: uuid, nullable: true }
                        metadata: { type: object }
                        createdAt: { type: string, format: date-time }
  /memory/index/runs/{id}:
    delete:
      summary: Delete one run session (its events cascade)
      operationId: deleteIndexRun
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Deleted.
  /memory/schema:
    get:
      summary: The graph schema registry with live counts
      description: |
        The vocabularies the indexer extracts against: entity types and typed-relationship
        predicates as registry rows (tier system/user, status active/disabled), edge
        relations from the engine, and the LLM proposal review queue (names the extractor
        wanted, with occurrence counts).
      operationId: getSchema
      responses:
        "200":
          description: Entity types, relations, and predicates with counts.
          content:
            application\json:
              schema:
                type: object
                properties:
                  entityTypes:
                    type: array
                    items:
                      type: object
                      properties:
                        name: { type: string, example: technology }
                        description: { type: string }
                        count: { type: integer, example: 12 }
                  relations:
                    type: array
                    items:
                      type: object
                      properties:
                        name: { type: string, example: mention }
                        description: { type: string }
                        count: { type: integer }
                  predicates:
                    type: array
                    items:
                      type: object
                      properties:
                        name: { type: string, example: works_on }
                        description: { type: string }
                        count: { type: integer }
    post:
      summary: Add a user-tier vocabulary entry
      description: |
        Add an entity type or predicate to the extraction vocabulary. The name is normalized
        to snake_case; the description becomes part of the extraction prompt, so write it
        like a rule ("a named drug or supplement"). Takes effect on the next index run.
      operationId: addSchemaEntry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [kind, name]
              properties:
                kind:
                  type: string
                  enum: [entity_type, predicate]
                name:
                  type: string
                  example: medication
                description:
                  type: string
                  example: a named drug or supplement
      responses:
        "200":
          description: The created (or re-activated) entry.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SchemaEntry"
        "400":
          $ref: "#/components/responses/ValidationError"
  /memory/schema/{id}:
    patch:
      summary: Enable or disable a vocabulary entry
      description: |
        Disabled entries leave the extraction prompt; entities already extracted under them
        stay in the graph. Works on system and user tiers (proposals have their own
        approve/dismiss lifecycle).
      operationId: setSchemaStatus
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status:
                  type: string
                  enum: [active, disabled]
      responses:
        "200":
          description: Status updated.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean, example: true }
        "400":
          $ref: "#/components/responses/ValidationError"
    delete:
      summary: Delete a disabled user-tier entry
      description: |
        Permanently remove a vocabulary entry. Only **disabled user-tier** entries qualify:
        built-in entries are re-seeded by name on the next run (a delete would bring them
        back active), so disabling is the only way to turn them off, and proposals are
        approved or dismissed instead. Entities already extracted under the deleted type
        stay in the graph.
      operationId: deleteSchemaEntry
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Entry deleted.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean, example: true }
        "404":
          description: No such entry.
        "409":
          description: The entry exists but is not deletable (still active, a built-in, or a proposal); the error names the reason.
  /memory/schema/{id}/approve:
    post:
      summary: Approve a proposal
      description: Promote a proposed name to the user tier and link its saved occurrences into the graph immediately (no re-index needed). The extractor also starts using the name on the next index run.
      operationId: approveProposal
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Proposal approved.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean, example: true }
  /memory/schema/{id}/dismiss:
    post:
      summary: Dismiss a proposal
      description: Reject a proposed name. The prompt blocklists it, so the extractor never proposes it again.
      operationId: dismissProposal
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Proposal dismissed.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean, example: true }
  /memory/auto-index:
    get:
      summary: Auto-index state
      description: |
        Whether new memories and files are entity-indexed automatically in the background
        (debounced runs a few seconds after a save/ingest). `available` is false in offline
        mode: extraction needs an LLM, so there is nothing to toggle.
      operationId: getAutoIndex
      responses:
        "200":
          description: The current state.
          content:
            application/json:
              schema:
                type: object
                properties:
                  enabled: { type: boolean, example: true }
                  available: { type: boolean, example: true }
    patch:
      summary: Turn auto-index on or off
      description: |
        The Console's toggle. Persisted in the store, so the choice survives daemon
        restarts; the MEMLOOM_AUTO_INDEX config value is only the default before the
        toggle is first used. Refused with 409 in offline mode.
      operationId: setAutoIndex
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [enabled]
              properties:
                enabled: { type: boolean }
      responses:
        "200":
          description: The new state.
          content:
            application/json:
              schema:
                type: object
                properties:
                  enabled: { type: boolean }
        "400":
          $ref: "#/components/responses/ValidationError"
        "409":
          description: No LLM configured; auto-index cannot be enabled.
  /memory/entities:
    get:
      summary: List entities with usage counts
      description: |
        Every extracted entity with its usage: active mention edges, distinct memories, and
        distinct documents that mention it. Most-mentioned first. Use this list to manage
        entities; /memory/graph shows the same data as a graph.
      operationId: listEntities
      responses:
        "200":
          description: The entities.
          content:
            application/json:
              schema:
                type: object
                properties:
                  entities:
                    type: array
                    items:
                      $ref: "#/components/schemas/EntityDetail"
  /memory/entities/{id}:
    patch:
      summary: Rename or retype an entity
      description: |
        A rename re-embeds the entity, since the embedding is computed from the name. It is
        refused with 409 when another entity already owns that name key; use merge instead.
        A retype must name an active vocabulary type.
      operationId: updateEntity
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  example: PostgreSQL
                entityType:
                  type: string
                  example: technology
      responses:
        "200":
          description: Entity updated.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean, example: true }
        "400":
          $ref: "#/components/responses/ValidationError"
        "404":
          description: No such entity.
        "409":
          description: The new name collides with an existing entity.
    delete:
      summary: Delete an entity
      description: |
        Remove the entity and every edge touching it (mentions pointing at it, typed
        relationships from or to it). The memories and documents that mentioned it are
        untouched.
      operationId: deleteEntity
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Entity deleted.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean, example: true }
        "404":
          description: No such entity.
  /memory/entities/{id}/merge:
    post:
      summary: Merge an entity into another
      description: |
        Fold this entity into a surviving one: every mention and typed relationship is
        repointed to the target (would-be duplicates and self-loops are dropped), then this
        entity is deleted. The survivor keeps its own name and type. Use it for
        near-duplicates that automatic resolution could not fold.
      operationId: mergeEntity
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: The entity that disappears.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [into]
              properties:
                into:
                  type: string
                  format: uuid
                  description: The surviving entity.
      responses:
        "200":
          description: Merged.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean, example: true }
        "400":
          description: Self-merge, or validation failure.
        "404":
          description: Either entity id is unknown.
  /memory/graph:
    get:
      summary: Get the memory graph
      description: |
        Returns active memories, extracted entities, and context documents as nodes, with
        the edges between them. Chunk-level mention edges are rolled up to one weighted
        document -> entity edge, so documents stay single nodes.
      operationId: getGraph
      responses:
        "200":
          description: The graph.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Graph"
  /memory/conflicts:
    get:
      summary: List pending conflicts
      description: Contradictions the belief pipeline flagged that you have not resolved yet. Both sides stay active until you decide.
      operationId: listConflicts
      responses:
        "200":
          description: Pending conflicts.
          content:
            application/json:
              schema:
                type: object
                properties:
                  conflicts:
                    type: array
                    items:
                      $ref: "#/components/schemas/Conflict"
  /memory/conflicts/{id}/resolve:
    post:
      summary: Resolve a conflict
      description: |
        Apply one of the four human-in-the-loop resolutions. Every resolution is non-destructive
        and reversible via the revert endpoint: losing memories are marked `stale` and kept
        in the store.
      operationId: resolveConflict
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: The conflict id from the save response or the conflicts list.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResolveDecision"
      responses:
        "400":
          $ref: "#/components/responses/ValidationError"
        "200":
          description: Resolution applied.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
  /memory/conflicts/{id}/revert:
    post:
      summary: Revert a resolution
      description: Undo a previous resolution. Staled memories come back to active and the conflict returns to the pending list.
      operationId: revertConflict
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Resolution reverted.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
  /context/add:
    post:
      summary: Ingest a file as context
      description: |
        Extract, chunk, embed, and store a .md/.txt/.pdf file from the daemon's machine.
        A document mirrors its file: re-adding an unchanged file is a no-op
        (`unchanged`), a changed file replaces its chunks (`updated`). Markdown chunks carry
        their heading breadcrumb; PDF chunks keep their page number. Chunks surface in normal
        `/memory/query` results with a `source`.
      operationId: contextAdd
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [path]
              properties:
                path:
                  type: string
                  description: Absolute path to a .md, .txt, or .pdf file on this machine.
                  example: C:\Users\me\notes\setup.md
      responses:
        "400":
          $ref: "#/components/responses/ValidationError"
        "503":
          $ref: "#/components/responses/StoreLocked"
        "200":
          description: What happened to the document.
          content:
            application/json:
              schema:
                type: object
                properties:
                  documentId:
                    type: string
                  outcome:
                    type: string
                    enum: [added, updated, unchanged]
                  title:
                    type: string
                    example: Deploy Guide
                  chunks:
                    type: integer
                    example: 12
  /context/documents:
    get:
      summary: List context documents
      operationId: listContextDocuments
      responses:
        "200":
          description: Ingested documents, most recently updated first.
          content:
            application/json:
              schema:
                type: object
                properties:
                  documents:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        path:
                          type: string
                        title:
                          type: string
                        kind:
                          type: string
                          enum: [md, txt, pdf]
                        chunkCount:
                          type: integer
                        updatedAt:
                          type: string
                          format: date-time
  /context/documents/{id}/chunks:
    get:
      summary: Get a document's chunks and their entity edges
      description: |
        One document at chunk granularity: chunks in order, plus their chunk -> entity mention
        edges. The graph endpoint rolls these up to one weighted document -> entity edge; this
        is the drill-down the viewer fetches when a document node is expanded.
      operationId: getDocumentChunks
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: The chunks and edges.
          content:
            application/json:
              schema:
                type: object
                properties:
                  chunks:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        chunkIndex:
                          type: integer
                        content:
                          type: string
                        headingPath:
                          type: string
                          nullable: true
                          example: Runbook > Restarts
                        page:
                          type: integer
                          nullable: true
                          description: 1-based PDF page, when the chunk came from a PDF.
                  edges:
                    type: array
                    items:
                      type: object
                      properties:
                        from:
                          type: string
                          description: Chunk id.
                        to:
                          type: string
                          description: Entity id.
                        relation:
                          type: string
                          example: mention
  /context/documents/{id}/open:
    post:
      summary: Open the source file on the daemon's machine
      description: |
        Opens the document's file with the OS default application (what the viewer's
        "Open file" button calls). Only ingested documents can be opened: the path is read
        from the document row looked up by id, so a client can never supply an arbitrary
        path to open.
      operationId: openContextDocument
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: The opener was launched.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
        "400":
          description: The document was uploaded from the browser (upload:// provenance); there is no file on disk to open.
        "404":
          description: No document with that id.
  /context/upload:
    post:
      summary: Upload file bytes as a document
      description: |
        Ingest a file whose bytes come from the client. The viewer's Upload button uses
        this, because a browser file dialog yields file bytes without a usable path. The
        document is listed, graphed, and indexed like any other. Its provenance is `upload://<filename>`,
        so re-uploading the same name replaces it and identical bytes are a no-op. Unlike
        path-linked documents there is no disk file to open or change-track; prefer
        /context/add when the daemon can read the file itself. Body limit ~48MB
        (base64 inflates by a third, so roughly a 36MB file).
      operationId: contextUpload
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [filename, contentBase64]
              properties:
                filename:
                  type: string
                  description: Name with extension; picks the extractor and titles the document.
                  example: notes.md
                contentBase64:
                  type: string
                  description: The file bytes, base64-encoded.
      responses:
        "200":
          description: The ingest outcome (same shape as /context/add for one file).
          content:
            application/json:
              schema:
                type: object
                properties:
                  documentId: { type: string, format: uuid }
                  outcome: { type: string, enum: [added, updated, unchanged] }
                  title: { type: string }
                  chunks: { type: integer }
        "400":
          description: Unsupported file type or empty content.
        "413":
          description: File too large.
  /context/documents/{id}:
    delete:
      summary: Remove a context document
      description: Deletes the document and all of its chunks (cascade). The source file on disk is untouched.
      operationId: removeContextDocument
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Removed.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
  /assistant/chat:
    post:
      summary: One assistant turn (SSE)
      description: |
        Run one chat turn through the assistant's agentic loop: the model decides whether to
        call hybrid recall (up to three times), then streams a grounded answer with `[n]`
        citation markers validated against the returned sources. The response is a
        server-sent-event stream of JSON events: `tool_call` and `tool_result` while the
        model searches, `delta` per answer fragment, then one terminal `done` (sessionId,
        messageId, answer, sources) or `error`.

        Omit `sessionId` to start a new chat (titled from this message). `model` overrides
        the configured chat model for this turn only; it must support tool calling on
        OpenRouter. Requires a chat-capable LLM: offline mode answers 503 with a setup hint.
      operationId: assistantChat
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [message]
              properties:
                message:
                  type: string
                  example: what are my plans for today?
                sessionId:
                  type: string
                  format: uuid
                  description: Continue an existing chat; omit to create one.
                model:
                  type: string
                  description: Per-turn OpenRouter model override (see /assistant/models).
                  example: anthropic/claude-sonnet-5
      responses:
        "200":
          description: The SSE event stream for this turn.
          content:
            text/event-stream:
              schema:
                type: string
        "400":
          $ref: "#/components/responses/ValidationError"
        "503":
          description: No chat-capable LLM configured (offline mode).
  /assistant/models:
    get:
      summary: The model catalog for the picker
      description: |
        Tool-capable models from OpenRouter's public catalog (the assistant requires native
        tool calling), shaped for display: USD per million input/output tokens, context
        window, provider (the model id's prefix). Cached daemon-side for an hour; a stale
        copy keeps serving if OpenRouter is unreachable. `defaultModel` is the daemon's
        configured chat model, or null in offline mode.
      operationId: assistantModels
      responses:
        "200":
          description: The catalog.
          content:
            application/json:
              schema:
                type: object
                properties:
                  defaultModel:
                    type: [string, "null"]
                    example: google/gemini-2.5-flash
                  models:
                    type: array
                    items:
                      type: object
                      properties:
                        id: { type: string, example: anthropic/claude-sonnet-5 }
                        name: { type: string, example: "Anthropic: Claude Sonnet 5" }
                        description: { type: string }
                        contextLength: { type: [integer, "null"], example: 1000000 }
                        promptPer1M: { type: [number, "null"], example: 2 }
                        completionPer1M: { type: [number, "null"], example: 10 }
                        provider: { type: string, example: anthropic }
        "502":
          description: OpenRouter unreachable and no cached copy yet.
  /assistant/sessions:
    get:
      summary: List chat sessions
      description: Starred first, then most recently active.
      operationId: assistantSessions
      responses:
        "200":
          description: The sessions.
          content:
            application/json:
              schema:
                type: object
                properties:
                  sessions:
                    type: array
                    items:
                      $ref: "#/components/schemas/AssistantSession"
    delete:
      summary: Delete all chat sessions
      description: Removes every session, its messages, and its attachments.
      operationId: clearAssistantSessions
      responses:
        "200":
          description: Cleared.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean, example: true }
  /assistant/sessions/search:
    get:
      summary: Search chat sessions
      description: |
        Hybrid chat search: keyword over titles and message text, plus embedding similarity
        over message content. Each hit carries the best-matching snippet.
      operationId: searchAssistantSessions
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Matching sessions with snippets.
          content:
            application/json:
              schema:
                type: object
                properties:
                  sessions:
                    type: array
                    items:
                      allOf:
                        - $ref: "#/components/schemas/AssistantSession"
                        - type: object
                          properties:
                            snippet: { type: string }
  /assistant/sessions/{id}:
    patch:
      summary: Rename or star a session
      operationId: patchAssistantSession
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title: { type: string }
                starred: { type: boolean }
      responses:
        "200":
          description: Updated.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean, example: true }
    delete:
      summary: Delete a session
      description: Removes the session, its messages, and its attached files.
      operationId: deleteAssistantSession
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean, example: true }
  /assistant/sessions/{id}/messages:
    get:
      summary: A session's messages
      description: Oldest first. Assistant messages carry the sources their answer cited.
      operationId: assistantMessages
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: The messages.
          content:
            application/json:
              schema:
                type: object
                properties:
                  messages:
                    type: array
                    items:
                      $ref: "#/components/schemas/AssistantMessage"
  /assistant/sessions/{id}/attachments:
    get:
      summary: A session's attached files
      operationId: sessionAttachments
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: The attachments (context-document shape, upload provenance).
          content:
            application/json:
              schema:
                type: object
                properties:
                  attachments:
                    type: array
                    items:
                      type: object
                      properties:
                        id: { type: string, format: uuid }
                        title: { type: string }
                        kind: { type: string, example: pdf }
                        chunkCount: { type: integer }
                        path: { type: string, example: "attachment://<sessionId>/brief.pdf" }
                        updatedAt: { type: string }
  /assistant/attachments:
    post:
      summary: Attach a file to a chat
      description: |
        Upload file bytes into one chat's scope. The file is chunked and embedded like a
        document, but only that session's recall searches it: it stays out of the documents
        list, the graph, and entity extraction, and it is deleted with the chat. Omit
        `sessionId` to create the session on the spot (titled 'New chat' until the first
        message names it). Body limit ~48MB (~36MB of file). Remove an attachment with
        DELETE /context/documents/{id}.
      operationId: assistantAttach
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [filename, contentBase64]
              properties:
                filename: { type: string, example: brief.pdf }
                contentBase64: { type: string }
                sessionId:
                  type: string
                  format: uuid
                  description: The chat to attach to; omit to create one.
      responses:
        "200":
          description: The ingest outcome plus the session it landed in.
          content:
            application/json:
              schema:
                type: object
                properties:
                  sessionId: { type: string, format: uuid }
                  documentId: { type: string, format: uuid }
                  outcome: { type: string, enum: [added, updated, unchanged] }
                  title: { type: string }
                  chunks: { type: integer }
        "400":
          description: Unsupported file type or empty content.
        "404":
          description: No such session.
        "413":
          description: File too large.
  /admin/shutdown:
    post:
      summary: Stop the daemon
      description: |
        Gracefully stop the daemon (what `memloom stop` calls): acknowledges, then closes the
        Postgres wire server, the HTTP server, the store, and releases the data-dir lock.
      operationId: shutdown
      responses:
        "200":
          description: Shutdown acknowledged; the daemon exits right after responding.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
                  stopping:
                    type: boolean
                    example: true
components:
  responses:
    StoreLocked:
      description: |
        The store is held by a connected Postgres wire client (Drizzle Studio, psql). PGLite is
        single-connection; disconnect that client and retry. All `/memory/*` endpoints can
        return this.
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
                example: the store is locked by a connected Postgres wire client (Drizzle Studio, psql, a DB panel). PGLite is single-connection; disconnect that client and retry.
    ValidationError:
      description: The request body failed validation. `issues` names each offending field.
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
                example: invalid request body
              issues:
                type: array
                items:
                  type: object
                  properties:
                    path:
                      type: string
                      example: query
                    message:
                      type: string
                      example: query must be a non-empty string
  schemas:
    SaveInput:
      type: object
      required: [content]
      properties:
        content:
          type: string
          description: The memory text to save.
          example: Acme reached $100 MRR.
        canonical:
          type: string
          description: Optional short canonical form used for exact-duplicate detection.
          example: Acme $100 MRR milestone
        memoryType:
          type: string
          enum: [fact, preference, episode, procedure]
          default: fact
          description: >-
            The kind of memory (defaults to `fact`):
            `fact` is a stable truth about the world or the user;
            `preference` is how the user likes things done;
            `episode` is a time-bound event or decision;
            `procedure` is reusable how-to steps.
          example: fact
        ownerId:
          type: string
          description: Owner UUID. Defaults to the fixed single-user sentinel in the embedded tier.
    SaveResult:
      type: object
      required: [id, outcome]
      properties:
        id:
          type: string
          description: Id of the saved (or merged-into) memory.
        outcome:
          type: string
          enum: [added, merged, conflict]
          description: What the belief pipeline did.
        conflictId:
          type: string
          description: Present when `outcome` is `conflict`; resolve it via the conflicts endpoints.
    Memory:
      type: object
      properties:
        id:
          type: string
        ownerId:
          type: string
        status:
          type: string
          enum: [active, stale]
        memoryType:
          type: string
          description: >-
            The kind of memory: one of `fact`, `preference`, `episode`, `procedure`. Recall
            results for ingested context chunks carry the sentinel `context` (see `kind`).
          example: fact
        canonical:
          type: string
          nullable: true
        content:
          type: string
        summary:
          type: string
          nullable: true
        assertedAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
        similarity:
          type: number
          description: Cosine similarity to the query (meaning signal alone). Present on recall results.
          example: 0.85
        rrfScore:
          type: number
          description: Fused reciprocal-rank-fusion score. Rank-based and small by design. Use it for ordering; it is not a percentage.
          example: 0.0328
        kind:
          type: string
          enum: [memory, context]
          description: Whether this result is a saved memory or a chunk of an ingested context document.
        source:
          type: object
          description: Present on context-chunk results; describes where the text came from.
          properties:
            documentId:
              type: string
            title:
              type: string
              example: Deploy Guide
            path:
              type: string
            headingPath:
              type: string
              nullable: true
              example: Deploy Guide > Database
            page:
              type: integer
              nullable: true
              description: 1-based PDF page.
    Conflict:
      type: object
      properties:
        id:
          type: string
        createdAt:
          type: string
          format: date-time
        incoming:
          type: object
          properties:
            id:
              type: string
            canonical:
              type: string
              nullable: true
            content:
              type: string
        candidates:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              canonical:
                type: string
                nullable: true
              content:
                type: string
              relation:
                type: string
                example: contradictory
              reason:
                type: string
                description: The classifier's explanation of why these contradict.
    ResolveDecision:
      oneOf:
        - type: object
          title: keep_new
          required: [action]
          properties:
            action:
              type: string
              enum: [keep_new]
              description: The new memory wins; existing candidates go stale.
        - type: object
          title: keep_existing
          required: [action, candidateId]
          properties:
            action:
              type: string
              enum: [keep_existing]
            candidateId:
              type: string
              description: The existing memory that wins; the new one goes stale.
        - type: object
          title: keep_both
          required: [action]
          properties:
            action:
              type: string
              enum: [keep_both]
              description: Mark them distinct; both stay active.
        - type: object
          title: merge
          required: [action, content]
          properties:
            action:
              type: string
              enum: [merge]
            content:
              type: string
              description: The reconciled memory text that supersedes both.
            canonical:
              type: string
    Graph:
      type: object
      properties:
        memories:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              canonical:
                type: string
                nullable: true
              content:
                type: string
              memoryType:
                type: string
                enum: [fact, preference, episode, procedure]
                example: fact
        entities:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              name:
                type: string
                example: Postgres
              entityType:
                type: string
                example: technology
        documents:
          type: array
          description: Ingested context documents. Chunk-level mentions roll up to these nodes.
          items:
            type: object
            properties:
              id:
                type: string
              title:
                type: string
                example: runbook.md
              path:
                type: string
                example: /home/me/docs/runbook.md
        edges:
          type: array
          items:
            type: object
            properties:
              from:
                type: string
              to:
                type: string
              relation:
                type: string
                example: mention
              weight:
                type: integer
                description: On document -> entity edges, how many of the document's chunks mention the entity.
                example: 3
    SchemaEntry:
      type: object
      description: One row of the vocabulary registry.
      properties:
        id:
          type: string
          format: uuid
        kind:
          type: string
          enum: [entity_type, predicate]
        name:
          type: string
          example: medication
        description:
          type: string
        tier:
          type: string
          enum: [system, user, proposed]
        status:
          type: string
          enum: [active, disabled, dismissed]
        occurrences:
          type: integer
          description: How many extraction runs suggested this name (proposals only).
    EntityDetail:
      type: object
      description: An entity with its usage counts.
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          example: "@memloom/core"
        entityType:
          type: string
          example: technology
        mentions:
          type: integer
          description: Active mention edges pointing at this entity.
        memories:
          type: integer
          description: Distinct active memories that mention it.
        documents:
          type: integer
          description: Distinct context documents whose chunks mention it.
    AssistantSession:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
          example: what are my plans for today?
        isStarred:
          type: boolean
        createdAt:
          type: string
        updatedAt:
          type: string
    AssistantMessage:
      type: object
      properties:
        id:
          type: string
          format: uuid
        role:
          type: string
          enum: [user, assistant]
        content:
          type: string
        sources:
          type: array
          description: The passages an assistant answer cited (empty on user messages).
          items:
            $ref: "#/components/schemas/AssistantSource"
        createdAt:
          type: string
    AssistantSource:
      type: object
      description: One recall hit an answer was grounded in; `n` matches the `[n]` markers in the text.
      properties:
        n:
          type: integer
          example: 1
        kind:
          type: string
          enum: [memory, context]
        id:
          type: string
          format: uuid
        title:
          type: string
          example: "memloom > How it compares"
        snippet:
          type: string
          description: The passage exactly as the model saw it.
        similarity:
          type: number
          example: 0.81
        date:
          type: string
          description: The memory's assertion day, YYYY-MM-DD (absent on context chunks).
        memoryType:
          type: string
          enum: [fact, preference, episode, procedure]
          description: Absent on context chunks.
        rrfScore:
          type: number
        graphNodeId:
          type: string
          format: uuid
          description: The graph node this source maps to (the memory, or the chunk's parent document).
